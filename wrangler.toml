name = "scms"
main = "./backend/auth-worker.js"
compatibility_date = "2026-03-16"
workers_dev = false
routes = [
  { pattern = "scms.seastar.work/*", zone_name = "seastar.work" }
]

[assets]
directory = "."
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[vars]
# ADMIN_PASSWORD → Cloudflare Secret으로 관리
NAVER_CLIENT_ID = "Sc7hFrtTJvFG2vfxWzM"
APP_REDIRECT_URL = "https://scms.seastar.work/"
NAVER_CALLBACK_URL = "https://scms.seastar.work/api/auth/naver/callback"
# NAVER_CLIENT_SECRET → Cloudflare 대시보드 Secret으로 관리 (GitHub 노출 방지)
KAKAO_CALLBACK_URL = "https://scms.seastar.work/api/auth/kakao/callback"
# KAKAO_REST_API_KEY → Cloudflare 대시보드 Secret으로 관리
# KAKAO_CLIENT_SECRET → Cloudflare 대시보드 Secret으로 관리
